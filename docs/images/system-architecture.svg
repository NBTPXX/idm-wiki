<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="browserGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c2128"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a3a5c"/><stop offset="100%" stop-color="#162d4a"/></linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d3b2d"/><stop offset="100%" stop-color="#1e2c1e"/></linearGradient>
    <linearGradient id="deviceGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a2a1a"/><stop offset="100%" stop-color="#3a1e10"/></linearGradient>
  </defs>

  <rect width="800" height="400" rx="8" fill="url(#bgGrad)"/>
  <text x="400" y="25" fill="#f0f6fc" font-size="16" font-weight="700" text-anchor="middle">IDM Flash Web 系统架构</text>

  <!-- Browser -->
  <rect x="40" y="45" width="160" height="180" rx="8" fill="url(#browserGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="120" y="75" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">Browser</text>
  <rect x="55" y="85" width="130" height="22" rx="3" fill="#0d1117"/>
  <text x="120" y="100" fill="#8b949e" font-size="9" text-anchor="middle">HTTP / WebSocket</text>
  <rect x="55" y="112" width="130" height="22" rx="3" fill="#0d1117"/>
  <text x="120" y="127" fill="#8b949e" font-size="9" text-anchor="middle">SPA Single Page App</text>
  <rect x="55" y="139" width="130" height="22" rx="3" fill="#0d1117"/>
  <text x="120" y="154" fill="#8b949e" font-size="9" text-anchor="middle">i18n 多语言</text>
  <rect x="55" y="166" width="130" height="22" rx="3" fill="#0d1117"/>
  <text x="120" y="181" fill="#8b949e" font-size="9" text-anchor="middle">Dark / Light Theme</text>

  <!-- Arrow browser → server -->
  <line x1="200" y1="135" x2="265" y2="135" stroke="#10b981" stroke-width="1.5"/>
  <text x="232" y="128" fill="#10b981" font-size="8" text-anchor="middle">API</text>

  <!-- Server -->
  <rect x="270" y="45" width="190" height="210" rx="8" fill="url(#serverGrad)" stroke="#1f6feb" stroke-width="1"/>
  <text x="365" y="75" fill="#79c0ff" font-size="13" font-weight="700" text-anchor="middle">Python Web Server</text>
  <text x="365" y="92" fill="#8b949e" font-size="9" text-anchor="middle">aiohttp · Port 8888</text>

  <rect x="285" y="102" width="160" height="22" rx="3" fill="#0d1117"/>
  <text x="365" y="117" fill="#8b949e" font-size="9" text-anchor="middle">/api/env  环境检测</text>
  <rect x="285" y="128" width="160" height="22" rx="3" fill="#0d1117"/>
  <text x="365" y="143" fill="#8b949e" font-size="9" text-anchor="middle">/api/fw   固件浏览</text>
  <rect x="285" y="154" width="160" height="22" rx="3" fill="#0d1117"/>
  <text x="365" y="169" fill="#8b949e" font-size="9" text-anchor="middle">/api/flash 刷写接口</text>
  <rect x="285" y="180" width="160" height="22" rx="3" fill="#0d1117"/>
  <text x="365" y="195" fill="#8b949e" font-size="9" text-anchor="middle">/api/can   CAN 查询</text>
  <rect x="285" y="206" width="160" height="22" rx="3" fill="#0d1117"/>
  <text x="365" y="221" fill="#8b949e" font-size="9" text-anchor="middle">WebSocket Console</text>

  <!-- Tools box -->
  <rect x="500" y="45" width="175" height="115" rx="8" fill="url(#toolGrad)" stroke="#238636" stroke-width="1"/>
  <text x="587" y="72" fill="#7ee787" font-size="12" font-weight="700" text-anchor="middle">Flash Tools</text>
  <rect x="515" y="82" width="145" height="20" rx="3" fill="#0d1117"/>
  <text x="587" y="96" fill="#8b949e" font-size="9" text-anchor="middle">flashtool.py (Katapult)</text>
  <rect x="515" y="106" width="145" height="20" rx="3" fill="#0d1117"/>
  <text x="587" y="120" fill="#8b949e" font-size="9" text-anchor="middle">flash_can.py (CAN)</text>
  <rect x="515" y="130" width="145" height="20" rx="3" fill="#0d1117"/>
  <text x="587" y="144" fill="#8b949e" font-size="9" text-anchor="middle">dfu-util</text>

  <!-- Moonraker box -->
  <rect x="500" y="175" width="175" height="80" rx="8" fill="url(#browserGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="587" y="200" fill="#8b949e" font-size="12" font-weight="700" text-anchor="middle">Moonraker</text>
  <rect x="515" y="210" width="145" height="18" rx="3" fill="#0d1117"/>
  <text x="587" y="223" fill="#8b949e" font-size="9" text-anchor="middle">update_manager</text>
  <rect x="515" y="232" width="145" height="18" rx="3" fill="#0d1117"/>
  <text x="587" y="245" fill="#8b949e" font-size="9" text-anchor="middle">moonraker.asvc</text>

  <!-- Arrow server → tools -->
  <line x1="460" y1="100" x2="500" y2="100" stroke="#7ee787" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Arrow server → moonraker -->
  <line x1="460" y1="215" x2="500" y2="215" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Hardware row -->
  <rect x="40" y="260" width="720" height="55" rx="6" fill="url(#deviceGrad)" stroke="#10b981" stroke-width="0.5"/>
  <text x="400" y="282" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle">Hardware Layer</text>
  <text x="400" y="302" fill="#8b949e" font-size="10" text-anchor="middle">CAN Interface (can0)  ·  USB Serial (/dev/serial/by-id/...)  ·  USB DFU · STM32F042x6 · Katapult Bootloader</text>

  <!-- Arrows down from server to hardware -->
  <line x1="300" y1="255" x2="300" y2="260" stroke="#10b981" stroke-width="1"/>
  <line x1="430" y1="255" x2="430" y2="260" stroke="#10b981" stroke-width="1"/>

  <!-- Bottom legend -->
  <rect x="40" y="330" width="720" height="52" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <rect x="60" y="342" width="10" height="10" rx="2" fill="#58a6ff"/>
  <text x="76" y="352" fill="#8b949e" font-size="10">前端</text>
  <rect x="120" y="342" width="10" height="10" rx="2" fill="#79c0ff"/>
  <text x="136" y="352" fill="#8b949e" font-size="10">后端</text>
  <rect x="180" y="342" width="10" height="10" rx="2" fill="#7ee787"/>
  <text x="196" y="352" fill="#8b949e" font-size="10">工具库</text>
  <rect x="250" y="342" width="10" height="10" rx="2" fill="#8b949e"/>
  <text x="266" y="352" fill="#8b949e" font-size="10">集成</text>
  <rect x="310" y="342" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="326" y="352" fill="#8b949e" font-size="10">硬件</text>
  <text x="410" y="352" fill="#484f58" font-size="10">Port 8888 · systemd: idm_flash_web.service · Git: gitee.com/NBTP/idm-documents</text>

  <!-- Dependency arrows between server and tools -->
  <text x="465" y="97" fill="#7ee787" font-size="7" text-anchor="middle">import</text>
  <text x="475" y="212" fill="#8b949e" font-size="7" text-anchor="middle">configure</text>
</svg>

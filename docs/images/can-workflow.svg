<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c2128"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="startGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#238636"/><stop offset="100%" stop-color="#1b6e2a"/></linearGradient>
    <linearGradient id="endGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f78166"/><stop offset="100%" stop-color="#da3633"/></linearGradient>
  </defs>

  <rect width="720" height="380" rx="8" fill="url(#bgGrad)"/>
  <text x="360" y="28" fill="#f0f6fc" font-size="16" font-weight="700" text-anchor="middle">CAN 模式刷写流程</text>
  <line x1="160" y1="36" x2="560" y2="36" stroke="#30363d" stroke-width="0.5"/>

  <!-- Steps -->
  <!-- Step 1 -->
  <rect x="30" y="55" width="130" height="60" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="95" y="78" fill="#8b949e" font-size="9">Step 1</text>
  <text x="95" y="95" fill="#f0f6fc" font-size="12" font-weight="600" text-anchor="middle">选择 CAN 模式</text>
  <text x="95" y="108" fill="#8b949e" font-size="9" text-anchor="middle">+ 频率 / 固件类型</text>

  <line x1="160" y1="85" x2="205" y2="85" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="210" y="55" width="130" height="60" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="78" fill="#8b949e" font-size="9">Step 2</text>
  <text x="275" y="95" fill="#f0f6fc" font-size="12" font-weight="600" text-anchor="middle">选择固件文件</text>
  <text x="275" y="108" fill="#8b949e" font-size="9" text-anchor="middle">Main / Deployer</text>

  <line x1="340" y1="85" x2="385" y2="85" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="390" y="55" width="130" height="60" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="78" fill="#8b949e" font-size="9">Step 3</text>
  <text x="455" y="95" fill="#f0f6fc" font-size="12" font-weight="600" text-anchor="middle">查询 CAN UUID</text>
  <text x="455" y="108" fill="#8b949e" font-size="9" text-anchor="middle">扫描 CAN 总线节点</text>

  <line x1="520" y1="85" x2="565" y2="85" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="570" y="55" width="130" height="60" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="78" fill="#8b949e" font-size="9">Step 4</text>
  <text x="635" y="95" fill="#f0f6fc" font-size="12" font-weight="600" text-anchor="middle">进入 Bootloader</text>
  <text x="635" y="108" fill="#8b949e" font-size="9" text-anchor="middle">Enter BL (如需要)</text>

  <!-- Arrow down from step 4 to bottom row -->
  <line x1="635" y1="115" x2="635" y2="235" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 5 -->
  <rect x="560" y="240" width="130" height="60" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="625" y="263" fill="#8b949e" font-size="9">Step 5</text>
  <text x="625" y="280" fill="#f0f6fc" font-size="12" font-weight="600" text-anchor="middle">开始刷写</text>
  <text x="625" y="293" fill="#8b949e" font-size="9" text-anchor="middle">flashtool + CAN 协议</text>

  <line x1="560" y1="270" x2="515" y2="270" stroke="#30363d" stroke-width="1.5"/>

  <!-- Step 6 -->
  <rect x="385" y="240" width="130" height="60" rx="6" fill="url(#stepGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="263" fill="#8b949e" font-size="9">Step 6</text>
  <text x="450" y="280" fill="#f0f6fc" font-size="12" font-weight="600" text-anchor="middle">退出 Bootloader</text>
  <text x="450" y="293" fill="#8b949e" font-size="9" text-anchor="middle">Exit BL → 启动固件</text>

  <line x1="385" y1="270" x2="340" y2="270" stroke="#30363d" stroke-width="1.5"/>

  <!-- Done -->
  <rect x="210" y="240" width="130" height="60" rx="6" fill="url(#endGrad)" stroke="#da3633" stroke-width="0.5"/>
  <text x="275" y="270" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Done</text>
  <text x="275" y="286" fill="rgba(255,255,255,0.7)" font-size="10" text-anchor="middle">固件刷写完成</text>

  <!-- Bottom legend -->
  <rect x="30" y="330" width="660" height="35" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <rect x="50" y="341" width="8" height="8" rx="2" fill="url(#stepGrad)" stroke="#30363d"/>
  <text x="64" y="350" fill="#8b949e" font-size="10">用户操作</text>
  <rect x="140" y="341" width="8" height="8" rx="2" fill="url(#endGrad)"/>
  <text x="154" y="350" fill="#8b949e" font-size="10">完成</text>
  <text x="230" y="350" fill="#484f58" font-size="10">CAN 通信协议：SocketCAN · 管理 ID 0x3f0 · 响应 ID 0x3f1 · 250kbps</text>
</svg>

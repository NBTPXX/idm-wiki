<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1f2b"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f78166"/><stop offset="100%" stop-color="#f0883e"/></linearGradient>
  </defs>

  <!-- Browser frame -->
  <rect x="10" y="10" width="780" height="500" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="10" y="10" width="780" height="32" rx="8" fill="#161b22"/>
  <rect x="10" y="34" width="780" height="8" fill="#161b22"/>
  <circle cx="28" cy="26" r="5" fill="#ff5f56"/>
  <circle cx="44" cy="26" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="26" r="5" fill="#27c93f"/>

  <!-- Header -->
  <rect x="10" y="42" width="780" height="40" fill="url(#header)"/>
  <text x="24" y="67" fill="#f0f6fc" font-size="15" font-weight="700">IDM Flash Web</text>
  <text x="740" y="67" fill="#58a6ff" font-size="12">Wiki</text>

  <!-- Accent bar -->
  <rect x="10" y="82" width="780" height="3" fill="url(#accentBar)"/>

  <!-- Mode tabs -->
  <rect x="24" y="98" width="70" height="30" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="38" y="117" fill="#58a6ff" font-size="12" font-weight="600">CAN</text>
  <rect x="98" y="98" width="70" height="30" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="114" y="117" fill="#8b949e" font-size="12">USB</text>
  <rect x="172" y="98" width="70" height="30" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="188" y="117" fill="#8b949e" font-size="12">DFU</text>

  <!-- CAN frequency -->
  <text x="24" y="152" fill="#8b949e" font-size="11">CAN 频率</text>
  <rect x="90" y="140" width="100" height="22" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="98" y="155" fill="#c9d1d9" font-size="11">1000000</text>
  <polygon points="178,146 184,156 172,156" fill="#8b949e"/>

  <!-- Firmware type -->
  <text x="210" y="152" fill="#8b949e" font-size="11">固件类型</text>
  <rect x="278" y="140" width="110" height="22" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="286" y="155" fill="#c9d1d9" font-size="11">Main Firmware</text>

  <!-- CAN UUID -->
  <text x="420" y="152" fill="#8b949e" font-size="11">CAN UUID</text>
  <rect x="490" y="140" width="130" height="22" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="624" y="140" width="42" height="22" rx="3" fill="#238636"/>
  <text x="634" y="155" fill="#fff" font-size="11">查询</text>

  <!-- Firmware file area -->
  <text x="24" y="192" fill="#8b949e" font-size="11">固件文件</text>
  <rect x="24" y="198" width="420" height="22" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="32" y="213" fill="#484f58" font-size="11">选择固件文件...</text>
  <rect x="448" y="198" width="42" height="22" rx="3" fill="#21262d" stroke="#30363d"/>
  <text x="458" y="213" fill="#c9d1d9" font-size="11">浏览</text>

  <!-- Action buttons -->
  <rect x="24" y="235" width="90" height="28" rx="4" fill="#238636"/>
  <text x="38" y="254" fill="#fff" font-size="12" font-weight="600">开始刷写</text>
  <rect x="122" y="235" width="55" height="28" rx="4" fill="#21262d" stroke="#30363d"/>
  <text x="134" y="254" fill="#c9d1d9" font-size="11">Enter BL</text>
  <rect x="185" y="235" width="55" height="28" rx="4" fill="#21262d" stroke="#30363d"/>
  <text x="197" y="254" fill="#c9d1d9" font-size="11">Exit BL</text>

  <!-- Console area -->
  <rect x="24" y="278" width="752" height="200" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="36" y="296" fill="#8b949e" font-size="10" font-family="monospace">$ python3 -m flash_can.can_flash ...</text>
  <text x="36" y="312" fill="#7ee787" font-size="10" font-family="monospace">Attempting to connect to bootloader</text>
  <text x="36" y="328" fill="#7ee787" font-size="10" font-family="monospace">CAN node detected: 2ca7ad8c2899</text>
  <text x="36" y="344" fill="#7ee787" font-size="10" font-family="monospace">Starting flash...</text>
  <text x="36" y="360" fill="#c9d1d9" font-size="10" font-family="monospace">Sending blocks [=========>         ] 45%</text>
  <text x="36" y="376" fill="#7ee787" font-size="10" font-family="monospace">Flash completed successfully</text>
  <text x="36" y="400" fill="#484f58" font-size="10" font-family="monospace">_</text>

  <!-- Labels for sections -->
  <line x1="24" y1="270" x2="776" y2="270" stroke="#30363d" stroke-dasharray="3,3"/>
  <text x="26" y="270" fill="#484f58" font-size="9" text-anchor="end" transform="translate(-6,-2)">输出</text>

  <!-- Side arrows/annotations -->
  <!-- Mode selector -->
  <line x1="280" y1="113" x2="310" y2="75" stroke="#8b949e" stroke-width="0.5"/>
  <text x="314" y="78" fill="#8b949e" font-size="8">连接模式</text>
  <!-- CAN UUID -->
  <line x1="560" y1="151" x2="570" y2="180" stroke="#8b949e" stroke-width="0.5"/>
  <text x="572" y="184" fill="#8b949e" font-size="8">设备 UUID</text>
</svg>

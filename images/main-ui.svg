<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#16191e"/><stop offset="100%" stop-color="#16191e"/></linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e2127"/><stop offset="100%" stop-color="#1e2127"/></linearGradient>
    <linearGradient id="btnPrimary" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="btnSecondary" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#292c33"/><stop offset="100%" stop-color="#292c33"/></linearGradient>
  </defs>

  <!-- Outer container -->
  <rect x="6" y="6" width="888" height="568" rx="8" fill="#16191e"/>

  <!-- Browser chrome -->
  <rect x="6" y="6" width="888" height="28" rx="8" fill="#1e2127"/>
  <rect x="6" y="26" width="888" height="8" fill="#1e2127"/>
  <circle cx="22" cy="20" r="4.5" fill="#ff5f56"/>
  <circle cx="36" cy="20" r="4.5" fill="#ffbd2e"/>
  <circle cx="50" cy="20" r="4.5" fill="#27c93f"/>
  <text x="460" y="22" fill="#6b7280" font-size="9" text-anchor="middle">http://192.168.1.100:8888</text>

  <!-- Header bar -->
  <rect x="6" y="34" width="888" height="40" fill="#16191e"/>
  <text x="26" y="60" fill="#d1d5db" font-size="16" font-weight="700">IDM Flash Tool</text>

  <!-- Header right: Moonraker + Lang + Theme -->
  <circle cx="740" cy="54" r="3.5" fill="#f59e0b"/>
  <text x="748" y="58" fill="#9ca3af" font-size="10">Moonraker</text>
  <rect x="808" y="46" width="30" height="16" rx="3" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="823" y="58" fill="#d1d5db" font-size="9">中文</text>
  <text x="852" y="58" fill="#9ca3af" font-size="12">☀</text>

  <!-- Border under header -->
  <line x1="20" y1="73" x2="880" y2="73" stroke="#3a3d44" stroke-width="0.5"/>

  <!-- === Environment Card === -->
  <rect x="20" y="82" width="860" height="48" rx="6" fill="#1e2127" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="36" y="100" fill="#9ca3af" font-size="11" font-weight="600">Environment</text>
  <!-- Bootloader -->
  <text x="36" y="116" fill="#6b7280" font-size="10">Bootloader</text>
  <text x="36" y="126" fill="#10b981" font-size="10">Katapult</text>
  <!-- CAN -->
  <text x="136" y="116" fill="#6b7280" font-size="10">CAN</text>
  <text x="136" y="126" fill="#10b981" font-size="10">can0</text>
  <!-- dfu-util -->
  <text x="216" y="116" fill="#6b7280" font-size="10">dfu-util</text>
  <text x="216" y="126" fill="#10b981" font-size="10">OK</text>
  <!-- Firmware Path -->
  <text x="316" y="116" fill="#6b7280" font-size="10">Firmware Path</text>
  <rect x="316" y="102" width="180" height="16" rx="3" fill="#16191e" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="322" y="114" fill="#9ca3af" font-size="9">~/idm-documents/firmware</text>

  <!-- === Left Column === -->
  <!-- Mode Card -->
  <rect x="20" y="140" width="410" height="228" rx="6" fill="#1e2127" stroke="#3a3d44" stroke-width="0.5"/>

  <!-- Tabs -->
  <rect x="20" y="140" width="410" height="32" rx="6" fill="#1e2127"/>
  <rect x="20" y="164" width="410" height="8" fill="#1e2127"/>
  <text x="36" y="162" fill="#10b981" font-size="12" font-weight="600">CAN Mode</text>
  <line x1="36" y1="169" x2="100" y2="169" stroke="#10b981" stroke-width="2"/>
  <text x="120" y="162" fill="#9ca3af" font-size="12">USB Mode</text>
  <text x="204" y="162" fill="#9ca3af" font-size="12">DFU Mode</text>

  <!-- Frequency -->
  <text x="36" y="192" fill="#9ca3af" font-size="10">Frequency</text>
  <rect x="36" y="196" width="180" height="24" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="44" y="212" fill="#d1d5db" font-size="11">1000000 (High)</text>
  <polygon points="204,206 210,212 198,212" fill="#9ca3af"/>

  <!-- Firmware Type -->
  <text x="36" y="236" fill="#9ca3af" font-size="10">Firmware Type</text>
  <rect x="36" y="240" width="180" height="24" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="44" y="256" fill="#d1d5db" font-size="11">IDM Main Firmware</text>
  <polygon points="204,250 210,256 198,256" fill="#9ca3af"/>

  <!-- Firmware Version -->
  <text x="36" y="280" fill="#9ca3af" font-size="10">Firmware Version</text>
  <rect x="36" y="284" width="180" height="24" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="44" y="300" fill="#d1d5db" font-size="11">v2.1.0</text>
  <polygon points="204,294 210,300 198,300" fill="#9ca3af"/>

  <!-- Firmware list -->
  <text x="36" y="324" fill="#9ca3af" font-size="10">Select Firmware</text>
  <rect x="36" y="328" width="378" height="24" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="44" y="344" fill="#9ca3af" font-size="10">idm-stm32-can-1m.bin</text>
  <rect x="36" y="354" width="378" height="2" rx="1" fill="#10b981"/>

  <!-- === Device Card === -->
  <rect x="20" y="378" width="410" height="96" rx="6" fill="#1e2127" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="36" y="398" fill="#9ca3af" font-size="11" font-weight="600">Device</text>

  <!-- CAN UUID -->
  <text x="36" y="420" fill="#9ca3af" font-size="10">CAN UUID</text>
  <rect x="36" y="424" width="260" height="24" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="44" y="440" fill="#34d399" font-size="10" font-family="monospace">2ca7ad8c2899</text>
  <rect x="302" y="424" width="56" height="24" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="312" y="440" fill="#d1d5db" font-size="10">Query</text>

  <!-- === Right Column === -->
  <rect x="444" y="140" width="436" height="328" rx="6" fill="#1e2127" stroke="#3a3d44" stroke-width="0.5"/>

  <!-- Console header -->
  <text x="460" y="166" fill="#d1d5db" font-size="13" font-weight="600">Flash Console</text>

  <!-- Action buttons -->
  <rect x="672" y="152" width="56" height="22" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="684" y="167" fill="#d1d5db" font-size="9">Enter BL</text>
  <rect x="734" y="152" width="50" height="22" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="746" y="167" fill="#d1d5db" font-size="9">Exit BL</text>
  <rect x="790" y="152" width="72" height="22" rx="4" fill="url(#btnPrimary)"/>
  <text x="803" y="167" fill="#fff" font-size="10" font-weight="600">Start Flash</text>

  <!-- Console area -->
  <rect x="460" y="182" width="404" height="222" rx="4" fill="#292c33" stroke="#3a3d44" stroke-width="0.5"/>
  <text x="474" y="198" fill="#6b7280" font-size="9" font-family="monospace">[14:32:01]</text>
  <text x="530" y="198" fill="#60a5fa" font-size="9" font-family="monospace">Detecting environment...</text>
  <text x="474" y="212" fill="#6b7280" font-size="9" font-family="monospace">[14:32:01]</text>
  <text x="530" y="212" fill="#34d399" font-size="9" font-family="monospace">Bootloader: Katapult</text>
  <text x="474" y="226" fill="#6b7280" font-size="9" font-family="monospace">[14:32:01]</text>
  <text x="530" y="226" fill="#34d399" font-size="9" font-family="monospace">CAN: can0 (ok)</text>
  <text x="474" y="240" fill="#6b7280" font-size="9" font-family="monospace">[14:32:02]</text>
  <text x="530" y="240" fill="#60a5fa" font-size="9" font-family="monospace">$ python3 -m flash_can.can_flash ...</text>
  <text x="474" y="254" fill="#6b7280" font-size="9" font-family="monospace">[14:32:03]</text>
  <text x="530" y="254" fill="#34d399" font-size="9" font-family="monospace">CAN query: node 2ca7ad8c2899</text>
  <text x="474" y="268" fill="#6b7280" font-size="9" font-family="monospace">[14:32:04]</text>
  <text x="530" y="268" fill="#60a5fa" font-size="9" font-family="monospace">Starting flash process...</text>
  <text x="474" y="282" fill="#6b7280" font-size="9" font-family="monospace">[14:32:08]</text>
  <text x="530" y="282" fill="#60a5fa" font-size="9" font-family="monospace">Sending blocks: [████████░░] 78%</text>
  <text x="474" y="296" fill="#6b7280" font-size="9" font-family="monospace">[14:32:12]</text>
  <text x="530" y="296" fill="#34d399" font-size="9" font-family="monospace">Flash completed successfully!</text>
  <text x="474" y="316" fill="#f87171" font-size="9" font-family="monospace">_</text>

  <!-- Progress bar -->
  <rect x="460" y="408" width="404" height="3" rx="1.5" fill="#3a3d44"/>
  <rect x="460" y="408" width="320" height="3" rx="1.5" fill="#10b981"/>

  <!-- Bottom bar -->
  <rect x="444" y="478" width="436" height="24" rx="6" fill="#1e2127"/>
  <text x="460" y="494" fill="#f59e0b" font-size="10" font-family="monospace">Status: Idle</text>

  <!-- Annotations -->
  <text x="26" y="138" fill="#6b7280" font-size="9">控制面板</text>
  <text x="456" y="138" fill="#6b7280" font-size="9">刷写控制台</text>
</svg>
